name: CI

on:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore ClaimsManagementSystem.csproj

      - name: Build
        run: dotnet build ClaimsManagementSystem.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ClaimsManagementSystem.csproj --configuration Release --no-build
